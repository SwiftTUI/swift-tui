# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
  {
    id = "swift-format",
    name = "run swift-format format",
    entry = "swift format format -i --configuration .swift-format.json",
    language = "system",
    files = '.*\.swift$',
    exclude = '^Vendor/(swift-hash|swift-png)/',
    pass_filenames = true
  },
  {
    id = "no-foundation-in-library-products",
    name = "forbid Foundation imports in library layers",
    entry = """zsh -lc 'if rg -n --glob "*.swift" "^(public import|import) Foundation$" Sources/Core Sources/View Sources/SwiftTUI; then echo "Foundation imports are forbidden in the Core, View, and SwiftTUI library layers."; exit 1; fi'""",
    language = "system",
    files = '^Sources/(Core|View|SwiftTUI)/.*\.swift$',
    pass_filenames = false
  },
  {
    id = "public-surface-policies",
    name = "enforce public surface and documentation guardrails",
    entry = "./Scripts/check_public_surface_policies.sh",
    language = "system",
    files = '^(Package\.swift|README\.md|docs/(RUNTIME|STATUS|PUBLIC_(API_INVENTORY|SURFACE_POLICY))\.md|Sources/.*\.swift|Sources/View/View\.docc/Authoring-Views\.md|Sources/SwiftTUI/SwiftTUI\.docc/Running-Apps\.md|Tests/ViewTests/ActorIsolationSurfaceTests\.swift|Tests/SwiftTUITests/(AppRuntimeTests|CollectionSupportTests|DiagnosticsAndCacheTests|InteractiveRuntimeTests|LayoutAndRenderingPipelineTests|Phase0FoundationTests|Phase1BenchmarkScenariosTests|Phase5ReliabilityGatesTests|ViewCompositionSurfaceTests|Support/InteractiveDemoTestSupport)\.swift)$',
    pass_filenames = false
  },
  {
    id = "structured-concurrency-escape-hatches",
    name = "forbid unchecked concurrency escape hatches",
    entry = "./Scripts/check_concurrency_safety_policies.sh",
    language = "system",
    files = '^(Package\.swift|(Sources|Tests|Runners|Examples)/.*\.swift)$',
    pass_filenames = false
  },
  {
    id = "main-thread-usage",
    name = "forbid bare Thread.isMainThread without thread-ismain-ok justification",
    entry = "./Scripts/check_main_thread_usage.sh",
    language = "system",
    files = '^((Sources|Tests|Runners|Examples|GUI)/.*\.swift|Scripts/check_main_thread_usage\.sh)$',
    pass_filenames = false
  },
  {
    id = "doc-frontmatter",
    name = "validate docs/decisions and docs/plans frontmatter",
    entry = "bun Scripts/check_doc_frontmatter.ts",
    language = "system",
    files = '^(docs/(decisions/[0-9].*\.md|plans/.*\.md)|Scripts/check_doc_frontmatter\.ts)$',
    pass_filenames = false
  },
]
