# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
  {
    id = "swift-format",
    name = "run swift-format format",
    entry = "swift format format -i --configuration .swift-format.json",
    language = "system",
    files = '.*\.swift$',
    pass_filenames = true
  },
  {
    id = "no-foundation-in-library-products",
    name = "forbid Foundation imports in library layers",
    entry = """zsh -lc 'if rg -n --glob "*.swift" "^(public import|import) Foundation$" Sources/Core Sources/View Sources/TerminalUI; then echo "Foundation imports are forbidden in the Core, View, and TerminalUI library layers."; exit 1; fi'""",
    language = "system",
    files = '^Sources/(Core|View|TerminalUI)/.*\.swift$',
    pass_filenames = false
  },
  {
    id = "public-surface-policies",
    name = "enforce public surface and documentation guardrails",
    entry = "./Scripts/check_public_surface_policies.zsh",
    language = "system",
    files = '^(Package\.swift|README\.md|docs/(RUNTIME|STATUS|PUBLIC_(API_INVENTORY|SURFACE_POLICY))\.md|Sources/.*\.swift|Sources/View/View\.docc/Authoring-Views\.md|Sources/TerminalUI/TerminalUI\.docc/Running-Apps\.md|Tests/ViewTests/ActorIsolationSurfaceTests\.swift|Tests/TerminalUITests/(AppRuntimeTests|CollectionSupportTests|DiagnosticsAndCacheTests|InteractiveRuntimeTests|LayoutAndRenderingPipelineTests|Phase0FoundationTests|Phase1BenchmarkScenariosTests|Phase5ReliabilityGatesTests|ViewCompositionSurfaceTests|Support/InteractiveDemoTestSupport)\.swift)$',
    pass_filenames = false
  },
  {
    id = "structured-concurrency-escape-hatches",
    name = "forbid unchecked concurrency escape hatches",
    entry = "./Scripts/check_concurrency_safety_policies.zsh",
    language = "system",
    files = '^(Package\.swift|(Sources|Tests|Runners|Examples)/.*\.swift)$',
    pass_filenames = false
  },
]
