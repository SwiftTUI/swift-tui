# Module-level defaults applied to any symbol in that module not listed
# under `classifications:` above. Useful for whole-module classifications
# (e.g. Core is a package-only target — every public symbol there is
# package-only-seam unless an explicit canonical override applies).
module_defaults:
  Core: package-only-seam
  SwiftTUIPrimitives: package-only-seam
  SwiftTUIGraph: package-only-seam
  SwiftTUI: canonical
  SwiftTUIRuntime: canonical
  SwiftTUIArguments: canonical
  SwiftTUIPTYPrimitives: canonical
  SwiftTUITerminal: canonical
  SwiftTUITerminalWorkspace: canonical
  SwiftTUICLI: canonical
  SwiftTUIWASISurfaceBridge: package-only-seam
  SwiftTUIWASI: canonical
  SwiftTUIWebHost: canonical
  SwiftTUIWebHostCLI: canonical
  SwiftTUIAndroidHost: canonical
  SwiftTUIPTYCPrimitives: package-only-seam

# Global fallback for any symbol not otherwise classified.
default: pending-review

# Optional human-readable notes appended in the generated baseline next to a
# qualified name. Keep these short — the prose in PUBLIC_API_INVENTORY.md is
# the right place for longer commentary.
notes:
  View.ResolvableView: "kept package-only; do not promote without ADR review"
