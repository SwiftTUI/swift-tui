# Public API classification overrides.
#
# Maps "Module.TypeName" → classification.
#
# This file is the single source of truth for how each top-level public
# symbol is classified. Symbols not listed here fall into the
# `pending-review` bucket and surface in the generated baseline as ⚠.
#
# Adding a new classification: drop the qualified name into the right
# bucket. Removing a symbol from the source: move it under `removed:`.
#
# Classifications:
#   canonical          — part of the supported authoring/runtime story.
#                        Documented in DocC and PUBLIC_API_INVENTORY.md.
#   package-only-seam  — exists for transitional reasons; not part of the
#                        intended product surface but tolerated.
#   test-support       — exposed only to support test access; not for
#                        ordinary app code.
#   deprecated         — public but slated for removal; carries a deprecation
#                        annotation in source.
#   removed            — explicitly retired. If a build emits a symbol with a
#                        name in this list the --check run fails.
#
# Default for unclassified symbols: pending-review.
#
# Seeded from docs/PUBLIC_API_INVENTORY.md as of the foundation PR.
# Kept intentionally conservative — when in doubt, leave a symbol in
# pending-review and let the next reviewer place it.

