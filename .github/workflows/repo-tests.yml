name: Repo Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-tests:
    name: Repo-wide verification
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache swiftly toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/swiftly
            ~/.swiftly
          key: ${{ runner.os }}-swiftly-6.3.0-v1

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-repo-tests-${{ hashFiles('Package.resolved', 'Runners/**/Package.resolved', 'GUI/**/Package.resolved', 'Examples/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-repo-tests-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            GUI/WebTUIGUI/node_modules
            Examples/WebExample/node_modules
          key: ${{ runner.os }}-bun-repo-tests-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-repo-tests-

      - name: Install/activate Swift 6.3.0 via swiftly
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v swiftly >/dev/null 2>&1 && [ ! -x "$HOME/.swiftly/bin/swiftly" ]; then
            curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
            installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
            ~/.swiftly/bin/swiftly init --quiet-shell-followup
            . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
            hash -r
          fi

          if ! swiftly list | grep -q "6.3.0"; then
            swiftly install 6.3.0
          fi
          swiftly use 6.3.0
          swiftly run swift --version

      - name: Run repo-wide verification
        shell: bash
        run: |
          set -euo pipefail
          ~/.swiftly/bin/swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          bun run test
