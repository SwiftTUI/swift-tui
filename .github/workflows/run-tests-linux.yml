name: Repo Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.13"
  SWIFTLY_VERSION: "1.1.1"

jobs:
  policy-checks:
    name: Policy checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl git libcurl4-openssl-dev ripgrep unzip

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}"
          swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
          curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
          tar -zxf "${swiftly_archive}"
          ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_HOME_DIR/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-policy-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-policy-
            ${{ runner.os }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            Examples/WebExample/node_modules
            Platforms/Web/node_modules
            Platforms/WebBuild/node_modules
            Website/node_modules
          key: ${{ runner.os }}-bun-policy-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-policy-
            ${{ runner.os }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run policy checks
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/check_public_surface_policies.sh
          ./Scripts/check_stable_doc_source_paths.sh
          ./Scripts/check_concurrency_safety_policies.sh
          ./Scripts/check_accessibility_guardrails.sh
          ./Scripts/check_webhost_package_boundary.sh
          ./Scripts/generate_public_api_inventory.sh --check

  linux-gate:
    name: Linux repo gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl git libcurl4-openssl-dev ripgrep unzip

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}"
          swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
          curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
          tar -zxf "${swiftly_archive}"
          ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_HOME_DIR/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-gate-
            ${{ runner.os }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            Examples/WebExample/node_modules
            Platforms/Web/node_modules
            Platforms/WebBuild/node_modules
            Website/node_modules
          key: ${{ runner.os }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-gate-
            ${{ runner.os }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run Linux portability smoke
        shell: bash
        run: |
          set -euo pipefail
          export DISABLE_EXPLICIT_PLATFORMS=1
          swiftly run swift build
          swiftly run swift test --filter SwiftTUICoreTests
          swiftly run swift test --filter SwiftTUIViewsTests
          swiftly run swift test --filter SwiftTUIAnimatedImageTests
          swiftly run swift test --filter SwiftTUIArgumentsTests
          swiftly run swift test --filter SwiftTUIPTYPrimitivesTests
          swiftly run swift test --filter WASISurfaceBridgeTests
          swiftly run swift test --filter SwiftTUIWASITests
          (cd Platforms/Web && bun test)
          (cd Platforms/WebBuild && bun test)

  macos-gate:
    name: macOS repo gate
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Install macOS test dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-gate-
            ${{ runner.os }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            Examples/WebExample/node_modules
            Platforms/Web/node_modules
            Platforms/WebBuild/node_modules
            Website/node_modules
          key: ${{ runner.os }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-gate-
            ${{ runner.os }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run repo gate
        shell: bash
        run: |
          set -euo pipefail
          export STUI_SWIFT_TEST_SKIP_REGEX='toastAutoDismissRerendersWithoutAdditionalInput'
          STUI_SWIFT_TEST_SKIP_REGEX+='|realInputReaderScrollBurstsUpdateVisibleGalleryPaneBeforeFollowUpClick'
          STUI_SWIFT_TEST_SKIP_REGEX+='|injectedTerminalInputScrollBurstsUpdateVisibleGalleryPaneBeforeFollowUpClick'
          STUI_SWIFT_TEST_SKIP_REGEX+='|duplicateIdentifiersRejected'
          STUI_SWIFT_TEST_SKIP_REGEX+='|staleSocketPathsReplaced'
          STUI_SWIFT_TEST_SKIP_REGEX+='|mostRecentSelectionUsesTimestamps'
          STUI_SWIFT_TEST_SKIP_REGEX+='|shutdownRemovesSocketPath'
          STUI_SWIFT_TEST_SKIP_REGEX+='|hostedSceneSessionRerendersOnSurfaceRefresh'
          STUI_SWIFT_TEST_SKIP_REGEX+='|spawnEcho'
          STUI_SWIFT_TEST_SKIP_REGEX+='|snapshotShowsOutput'
          STUI_SWIFT_TEST_SKIP_REGEX+='|catLargeFileDoesNotBlowByteBudget'
          STUI_SWIFT_TEST_SKIP_REGEX+='|latencyInjectedPresentationStaysResponsive'
          STUI_SWIFT_TEST_SKIP_REGEX+='|semanticHostFramePresentEmitsV2FrameWithAccessibilityTree'
          STUI_SWIFT_TEST_SKIP_REGEX+='|semanticHostFramePresentEmitsDamageAndPartialMetrics'
          STUI_SWIFT_TEST_SKIP_REGEX+='|sinkBackpressurePreservesPresentRecordOrder'
          STUI_SWIFT_TEST_SKIP_REGEX+='|transportSendsTypedClipboardRecords'
          STUI_SWIFT_TEST_SKIP_REGEX+='|transportSendsTypedRuntimeIssueRecords'
          STUI_SWIFT_TEST_SKIP_REGEX+='|realTerminalHostDeletingTopTodoRowKeepsTodoVisible'
          STUI_SWIFT_TEST_SKIP_REGEX+='|sceneHostedGalleryDeletingTopTodoRowKeepsTodoVisible'
          sh ./Scripts/test_gate.sh --skip-bun-install

  ios-build:
    name: iOS package build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.3 support
        shell: bash
        run: |
          set -euo pipefail
          for xcode in \
            /Applications/Xcode_26.4.1.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.5_beta_2.app
          do
            if [[ -d "$xcode" ]]; then
              developer_dir="$xcode/Contents/Developer"
              echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
              DEVELOPER_DIR="$developer_dir" xcodebuild -version
              DEVELOPER_DIR="$developer_dir" xcrun swift --version
              exit 0
            fi
          done

          echo "No Xcode installation with Swift 6.3 support was found." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Build SwiftUI host for generic iOS
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme SwiftUIHost \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            build
