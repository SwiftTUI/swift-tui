name: Repo Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_arm64:
        description: Run the Linux arm64 gate in addition to amd64
        required: false
        default: false
        type: boolean
      run_macos:
        description: Run the macOS gate
        required: false
        default: false
        type: boolean
      run_ios:
        description: Run the generic iOS package build
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: repo-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  SWIFTLY_VERSION: "1.1.1"

jobs:
  linux-gate:
    name: Linux repo gate (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.run_arm64 && '[{"arch":"amd64","runner":"ubuntu-24.04"},{"arch":"arm64","runner":"ubuntu-24.04-arm"}]' || '[{"arch":"amd64","runner":"ubuntu-24.04"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record lane start
        shell: bash
        run: |
          set -euo pipefail
          printf 'LANE_STARTED_EPOCH=%s\n' "$(date +%s)" >> "$GITHUB_ENV"

      - name: Install Linux test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            jq \
            libcurl4-openssl-dev \
            ripgrep \
            unzip

      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/swiftly
            ~/.local/bin/swiftly
          key: ${{ runner.os }}-${{ matrix.arch }}-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swiftly-${{ env.SWIFTLY_VERSION }}-

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="$HOME/.local/share/swiftly"
          export SWIFTLY_BIN_DIR="$HOME/.local/bin"
          mkdir -p "$SWIFTLY_BIN_DIR"
          export PATH="$SWIFTLY_BIN_DIR:$PATH"

          if ! command -v swiftly >/dev/null 2>&1 || [ ! -f "${SWIFTLY_HOME_DIR}/env.sh" ]; then
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            cd "$tmpdir"
            swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
            curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
            tar -zxf "$swiftly_archive"
            ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          fi

          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/.swift-version")"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-${{ matrix.arch }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swiftpm-gate-
            ${{ runner.os }}-${{ matrix.arch }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-bun-gate-
            ${{ runner.os }}-${{ matrix.arch }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run repo gate
        shell: bash
        env:
          STUI_TEST_STEP_TIMEOUT_SECONDS: "1200"
          STUI_SKIP_PUBLIC_API_BASELINE: "1"
          STUI_SKIP_TERMUIPERF: "1"
        run: |
          set -euo pipefail
          sh ./Scripts/test_gate.sh --skip-bun-install

      - name: Record lane result
        if: always()
        shell: bash
        env:
          LANE_ID: linux-${{ matrix.arch }}
          LANE_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          duration="-"
          if [ -n "${LANE_STARTED_EPOCH:-}" ]; then
            duration="$(($(date +%s) - LANE_STARTED_EPOCH))"
          fi
          printf '%s|%s|%s\n' "$LANE_ID" "$LANE_RESULT" "$duration" > ".ci-results/$LANE_ID.result"

      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-result-linux-${{ matrix.arch }}
          path: .ci-results/linux-${{ matrix.arch }}.result
          if-no-files-found: error
          retention-days: 1

  linux-gate-required:
    name: Linux repo gate
    runs-on: ubuntu-24.04
    needs: linux-gate
    if: always()
    timeout-minutes: 5

    steps:
      - name: Require native Linux matrix
        shell: bash
        env:
          MATRIX_RESULT: ${{ needs.linux-gate.result }}
        run: |
          set -euo pipefail
          if [ "$MATRIX_RESULT" != "success" ]; then
            printf 'Native Linux matrix finished with result: %s\n' "$MATRIX_RESULT" >&2
            exit 1
          fi

  macos-gate:
    name: macOS repo gate
    runs-on: macos-26
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_macos }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record lane start
        shell: bash
        run: |
          set -euo pipefail
          printf 'LANE_STARTED_EPOCH=%s\n' "$(date +%s)" >> "$GITHUB_ENV"

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Install macOS test dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-gate-
            ${{ runner.os }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-gate-
            ${{ runner.os }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run repo gate
        shell: bash
        env:
          STUI_TEST_STEP_TIMEOUT_SECONDS: "1200"
          STUI_SKIP_PUBLIC_API_BASELINE: "1"
          STUI_SKIP_TERMUIPERF: "1"
        run: |
          set -euo pipefail
          sh ./Scripts/test_gate.sh --skip-bun-install

      - name: Record lane result
        if: always()
        shell: bash
        env:
          LANE_ID: macos
          LANE_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          duration="-"
          if [ -n "${LANE_STARTED_EPOCH:-}" ]; then
            duration="$(($(date +%s) - LANE_STARTED_EPOCH))"
          fi
          printf '%s|%s|%s\n' "$LANE_ID" "$LANE_RESULT" "$duration" > ".ci-results/$LANE_ID.result"

      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-result-macos
          path: .ci-results/macos.result
          if-no-files-found: error
          retention-days: 1

  ios-build:
    name: iOS package build
    runs-on: macos-26
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ios }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record lane start
        shell: bash
        run: |
          set -euo pipefail
          printf 'LANE_STARTED_EPOCH=%s\n' "$(date +%s)" >> "$GITHUB_ENV"

      - name: Select Xcode with Swift 6.3 support
        shell: bash
        run: |
          set -euo pipefail
          for xcode in \
            /Applications/Xcode_26.4.1.app \
            /Applications/Xcode_26.4.app \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.5.app \
            /Applications/Xcode_26.5_beta_2.app
          do
            if [[ -d "$xcode" ]]; then
              developer_dir="$xcode/Contents/Developer"
              echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
              DEVELOPER_DIR="$developer_dir" xcodebuild -version
              DEVELOPER_DIR="$developer_dir" xcrun swift --version
              exit 0
            fi
          done

          echo "No Xcode installation with Swift 6.3 support was found." >&2
          ls -1 /Applications/Xcode*.app >&2 || true
          exit 1

      - name: Build SwiftUI host for generic iOS
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme SwiftUIHost \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            build

      - name: Record lane result
        if: always()
        shell: bash
        env:
          LANE_ID: ios
          LANE_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          duration="-"
          if [ -n "${LANE_STARTED_EPOCH:-}" ]; then
            duration="$(($(date +%s) - LANE_STARTED_EPOCH))"
          fi
          printf '%s|%s|%s\n' "$LANE_ID" "$LANE_RESULT" "$duration" > ".ci-results/$LANE_ID.result"

      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-result-ios
          path: .ci-results/ios.result
          if-no-files-found: error
          retention-days: 1

  ci-summary:
    name: CI test matrix summary
    runs-on: ubuntu-24.04
    needs:
      - linux-gate
      - linux-gate-required
      - macos-gate
      - ios-build
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download lane results
        id: download-results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: .ci-results
          pattern: ci-test-result-*
          merge-multiple: true

      - name: Publish matrix summary
        if: always()
        shell: bash
        env:
          RUN_ARM64: ${{ github.event_name == 'workflow_dispatch' && inputs.run_arm64 }}
          RUN_MACOS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_macos }}
          RUN_IOS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ios }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          expected_file=.ci-results/expected.txt
          cat > "$expected_file" <<'EOF'
          linux-amd64|Linux repo gate|Linux|amd64|ubuntu-24.04|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          if [ "$RUN_ARM64" = "true" ]; then
            cat >> "$expected_file" <<'EOF'
          linux-arm64|Linux repo gate|Linux|arm64|ubuntu-24.04-arm|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          fi
          if [ "$RUN_MACOS" = "true" ]; then
            cat >> "$expected_file" <<'EOF'
          macos|macOS repo gate|macOS|-|macos-26|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          fi
          if [ "$RUN_IOS" = "true" ]; then
            cat >> "$expected_file" <<'EOF'
          ios|iOS package build|iOS|generic|macos-26|xcodebuild -scheme SwiftUIHost -destination generic/platform=iOS -skipPackagePluginValidation build
          EOF
          fi
          Scripts/render_ci_test_matrix_summary.sh \
            "$expected_file" \
            .ci-results \
            "$GITHUB_STEP_SUMMARY"
