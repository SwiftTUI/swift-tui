name: Repo Gate

on:
  push:
    branches:
      - main
  pull_request:
  # Nightly run: the only trigger that exercises the macOS lane automatically.
  # macOS is the primary user platform for a terminal UI framework but was
  # workflow_dispatch-only, so releases shipped on Linux-only signal.
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      run_arm64:
        description: Run the Linux arm64 gate in addition to amd64
        required: false
        default: false
        type: boolean
      run_macos:
        description: Run the macOS gate
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# The event name keeps scheduled runs in their own group: a push to main must
# not cancel the in-flight nightly macOS lane (its only automatic signal).
concurrency:
  group: repo-gate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  SWIFTLY_VERSION: "1.1.1"

jobs:
  linux-gate:
    name: Linux repo gate (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.run_arm64 && '[{"arch":"amd64","runner":"ubuntu-24.04"},{"arch":"arm64","runner":"ubuntu-24.04-arm"}]' || '[{"arch":"amd64","runner":"ubuntu-24.04"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record lane start
        shell: bash
        run: |
          set -euo pipefail
          printf 'LANE_STARTED_EPOCH=%s\n' "$(date +%s)" >> "$GITHUB_ENV"

      - name: Install Linux test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            jq \
            libcurl4-openssl-dev \
            python3 \
            ripgrep \
            unzip

      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/swiftly
            ~/.local/bin/swiftly
          key: ${{ runner.os }}-${{ matrix.arch }}-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swiftly-${{ env.SWIFTLY_VERSION }}-

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="$HOME/.local/share/swiftly"
          export SWIFTLY_BIN_DIR="$HOME/.local/bin"
          mkdir -p "$SWIFTLY_BIN_DIR"
          export PATH="$SWIFTLY_BIN_DIR:$PATH"

          if ! command -v swiftly >/dev/null 2>&1 || [ ! -f "${SWIFTLY_HOME_DIR}/env.sh" ]; then
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            cd "$tmpdir"
            swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
            curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
            tar -zxf "$swiftly_archive"
            ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          fi

          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/.swift-version")"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-${{ matrix.arch }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swiftpm-gate-
            ${{ runner.os }}-${{ matrix.arch }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-${{ matrix.arch }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-bun-gate-
            ${{ runner.os }}-${{ matrix.arch }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Ensure gdb for hang diagnostics
        shell: bash
        run: |
          set -euo pipefail
          command -v gdb >/dev/null 2>&1 || sudo apt-get install -y --no-install-recommends gdb

      - name: Run repo gate
        shell: bash
        env:
          STUI_TEST_STEP_TIMEOUT_SECONDS: "1200"
          STUI_HANG_DIAGNOSTICS: "1"
          STUI_SKIP_PUBLIC_API_BASELINE: "1"
          STUI_SKIP_TERMUIPERF: "1"
        run: |
          set -euo pipefail
          sh ./Scripts/test_gate.sh --skip-bun-install

      - name: Record lane result
        if: always()
        shell: bash
        env:
          LANE_ID: linux-${{ matrix.arch }}
          LANE_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          duration="-"
          if [ -n "${LANE_STARTED_EPOCH:-}" ]; then
            duration="$(($(date +%s) - LANE_STARTED_EPOCH))"
          fi
          printf '%s|%s|%s\n' "$LANE_ID" "$LANE_RESULT" "$duration" > ".ci-results/$LANE_ID.result"

      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-result-linux-${{ matrix.arch }}
          path: .ci-results/linux-${{ matrix.arch }}.result
          if-no-files-found: error
          retention-days: 1

  linux-gate-required:
    name: Linux repo gate
    runs-on: ubuntu-24.04
    needs: linux-gate
    if: always()
    timeout-minutes: 5

    steps:
      - name: Require native Linux matrix
        shell: bash
        env:
          MATRIX_RESULT: ${{ needs.linux-gate.result }}
        run: |
          set -euo pipefail
          if [ "$MATRIX_RESULT" != "success" ]; then
            printf 'Native Linux matrix finished with result: %s\n' "$MATRIX_RESULT" >&2
            exit 1
          fi

  # Cross-compiles the WASI surface on every push/PR. The Linux gate never
  # builds wasm32-wasi, so a WASI-only break (unguarded C stdio/POSIX outside
  # `#if canImport(WASILibc)`) shipped green at 0.0.19 and again at 0.0.26 and
  # only surfaced in the swift-tui-examples / swift-tui-site gates after the
  # tag was cut. Building the SwiftTUIWASI product covers the WASI runner shim
  # plus, transitively, the whole library surface (Core, Views, Runtime).
  wasi-cross-compile:
    name: wasm32-wasi cross-compile
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The toolchain version tracks the pinned .swift-version. The value is
      # validated against a strict pattern before any downstream use so
      # attacker-controlled file contents (e.g. on a fork PR) cannot inject
      # shell into the steps below; it is then passed via env, never
      # interpolated directly into a run script.
      - name: Resolve pinned Swift version
        id: swift
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .swift-version)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Unexpected .swift-version contents: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux Swift dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/swiftly
            ~/.local/bin/swiftly
          key: ${{ runner.os }}-amd64-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-amd64-swiftly-${{ env.SWIFTLY_VERSION }}-

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="$HOME/.local/share/swiftly"
          export SWIFTLY_BIN_DIR="$HOME/.local/bin"
          mkdir -p "$SWIFTLY_BIN_DIR"
          export PATH="$SWIFTLY_BIN_DIR:$PATH"

          if ! command -v swiftly >/dev/null 2>&1 || [ ! -f "${SWIFTLY_HOME_DIR}/env.sh" ]; then
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            cd "$tmpdir"
            swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
            curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
            tar -zxf "$swiftly_archive"
            ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          fi

          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/.swift-version")"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"

      - name: Install the wasm32-wasi Swift SDK
        shell: bash
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          . "${SWIFTLY_HOME_DIR}/env.sh"
          case "$SWIFT_VERSION" in
            6.3.1)
              WASM_SDK_CHECKSUM="bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2"
              ;;
            *)
              echo "::error::No pinned wasm SDK checksum for Swift ${SWIFT_VERSION}"
              exit 1
              ;;
          esac
          if ! swiftly run swift sdk list | grep -q "swift-${SWIFT_VERSION}-RELEASE_wasm"; then
            swiftly run swift sdk install \
              "https://download.swift.org/swift-${SWIFT_VERSION}-release/wasm-sdk/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE_wasm.artifactbundle.tar.gz" \
              --checksum "$WASM_SDK_CHECKSUM"
          fi
          swiftly run swift sdk list

      # --target, not --product: for an automatic library product SwiftPM
      # builds the whole package graph, which includes deliberately
      # non-WASI targets (SwiftTUIPTYCPrimitives fork/exec, dladdr helpers).
      # The target build is exactly the SwiftTUIWASI closure.
      - name: Cross-compile SwiftTUIWASI for wasm32-wasi
        shell: bash
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          . "${SWIFTLY_HOME_DIR}/env.sh"
          swiftly run swift build \
            --swift-sdk "swift-${SWIFT_VERSION}-RELEASE_wasm" \
            --target SwiftTUIWASI

  macos-gate:
    name: macOS repo gate
    runs-on: macos-26
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_macos) }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record lane start
        shell: bash
        run: |
          set -euo pipefail
          printf 'LANE_STARTED_EPOCH=%s\n' "$(date +%s)" >> "$GITHUB_ENV"

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Install macOS test dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-gate-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-gate-
            ${{ runner.os }}-swiftpm-

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-gate-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-gate-
            ${{ runner.os }}-bun-

      - name: Install Bun workspace deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Run repo gate
        shell: bash
        env:
          STUI_TEST_STEP_TIMEOUT_SECONDS: "1200"
          STUI_SKIP_PUBLIC_API_BASELINE: "1"
          STUI_SKIP_TERMUIPERF: "1"
        run: |
          set -euo pipefail
          sh ./Scripts/test_gate.sh --skip-bun-install

      - name: Record lane result
        if: always()
        shell: bash
        env:
          LANE_ID: macos
          LANE_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          duration="-"
          if [ -n "${LANE_STARTED_EPOCH:-}" ]; then
            duration="$(($(date +%s) - LANE_STARTED_EPOCH))"
          fi
          printf '%s|%s|%s\n' "$LANE_ID" "$LANE_RESULT" "$duration" > ".ci-results/$LANE_ID.result"

      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-result-macos
          path: .ci-results/macos.result
          if-no-files-found: error
          retention-days: 1

  ci-summary:
    name: CI test matrix summary
    runs-on: ubuntu-24.04
    needs:
      - linux-gate
      - linux-gate-required
      - macos-gate
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download lane results
        id: download-results
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: .ci-results
          pattern: ci-test-result-*
          merge-multiple: true

      - name: Publish matrix summary
        if: always()
        shell: bash
        env:
          RUN_ARM64: ${{ github.event_name == 'workflow_dispatch' && inputs.run_arm64 }}
          RUN_MACOS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_macos) }}
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          expected_file=.ci-results/expected.txt
          cat > "$expected_file" <<'EOF'
          linux-amd64|Linux repo gate|Linux|amd64|ubuntu-24.04|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          if [ "$RUN_ARM64" = "true" ]; then
            cat >> "$expected_file" <<'EOF'
          linux-arm64|Linux repo gate|Linux|arm64|ubuntu-24.04-arm|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          fi
          if [ "$RUN_MACOS" = "true" ]; then
            cat >> "$expected_file" <<'EOF'
          macos|macOS repo gate|macOS|-|macos-26|STUI_SKIP_PUBLIC_API_BASELINE=1 STUI_SKIP_TERMUIPERF=1 sh ./Scripts/test_gate.sh --skip-bun-install
          EOF
          fi
          Scripts/render_ci_test_matrix_summary.sh \
            "$expected_file" \
            .ci-results \
            "$GITHUB_STEP_SUMMARY"
