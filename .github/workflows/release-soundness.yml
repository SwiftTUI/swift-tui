name: Release Soundness Lane

# F05: the only release-configuration test executions in the repo. Scheduled
# rather than push/PR-gating: release builds are slow, and the lane's flaky-
# suite step intentionally exercises the load-flaky run-loop suites
# (docs/KNOWN-TEST-FLAKES.md #1) where an intermittent red is signal, not a
# merge blocker.

on:
  schedule:
    - cron: "42 4 * * *"
  workflow_dispatch:
    inputs:
      run_race_checks:
        description: Also run the -enable-actor-data-race-checks variant
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-soundness-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFTLY_VERSION: "1.1.1"

jobs:
  release-soundness:
    name: Release soundness lane
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            jq \
            libcurl4-openssl-dev \
            python3 \
            unzip

      - name: Cache Swiftly toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/swiftly
            ~/.local/bin/swiftly
          key: ${{ runner.os }}-amd64-swiftly-${{ env.SWIFTLY_VERSION }}-${{ hashFiles('.swift-version') }}
          restore-keys: |
            ${{ runner.os }}-amd64-swiftly-${{ env.SWIFTLY_VERSION }}-

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          export SWIFTLY_HOME_DIR="$HOME/.local/share/swiftly"
          export SWIFTLY_BIN_DIR="$HOME/.local/bin"
          mkdir -p "$SWIFTLY_BIN_DIR"
          export PATH="$SWIFTLY_BIN_DIR:$PATH"

          if ! command -v swiftly >/dev/null 2>&1 || [ ! -f "${SWIFTLY_HOME_DIR}/env.sh" ]; then
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            cd "$tmpdir"
            swiftly_archive="swiftly-${SWIFTLY_VERSION}-$(uname -m).tar.gz"
            curl -fsSLO "https://download.swift.org/swiftly/linux/${swiftly_archive}"
            tar -zxf "$swiftly_archive"
            ./swiftly init --skip-install --quiet-shell-followup --assume-yes
          fi

          . "${SWIFTLY_HOME_DIR}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/.swift-version")"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR" >> "$GITHUB_ENV"

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-amd64-swiftpm-release-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-amd64-swiftpm-release-

      - name: Release soundness lane
        shell: bash
        run: |
          set -euo pipefail
          sh ./Scripts/release_soundness_lane.sh

      - name: Load-flaky suites (signal only, never blocks)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # continue-on-error masked a 100%-broken lane for days (an arg error
          # killed the script 130 ms in while the run stayed green) — annotate
          # loudly so a red here is visible in the run summary either way.
          if ! sh ./Scripts/release_soundness_lane.sh --flaky-only; then
            echo "::warning title=Release soundness flaky lane::flaky-trio run failed — crash signal (docs/KNOWN-TEST-FLAKES.md #1) or lane breakage; inspect this step's log"
            exit 1
          fi

      - name: Actor data-race checks variant
        if: ${{ github.event_name == 'schedule' || inputs.run_race_checks }}
        shell: bash
        run: |
          set -euo pipefail
          sh ./Scripts/release_soundness_lane.sh --race-checks
