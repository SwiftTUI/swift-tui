name: CPU latency perf smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-smoke:
    name: Archive non-failing perf smoke artifacts
    runs-on: macos-26
    timeout-minutes: 20

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          SWIFT_VERSION="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$SWIFT_VERSION"
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-termui-perf-${{ hashFiles('Tools/TermUIPerf/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-termui-perf-
            ${{ runner.os }}-swiftpm-

      - name: Run perf smoke
        shell: bash
        run: sh Scripts/run_perf_smoke.sh

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: termui-perf-runs
          path: .perf/runs
          if-no-files-found: warn
