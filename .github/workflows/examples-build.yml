name: Build Examples for Linux

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-examples:
    name: Build ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - gallery
          - todoist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache swiftly toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/swiftly
            ~/.swiftly
          key: ${{ runner.os }}-swiftly-6.3.0-v1

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ matrix.example }}-${{ hashFiles(format('Examples/{0}/Package.resolved', matrix.example)) }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-${{ matrix.example }}-

      - name: Install/activate Swift 6.3.0 via swiftly
        shell: bash
        run: |
          set -euo pipefail
          if swift --version 2>/dev/null | grep -q "Swift version 6.3.0"; then
            echo "Swift 6.3.0 already available on runner"
            exit 0
          fi

          if ! command -v swiftly >/dev/null 2>&1; then
            curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
            tar zxf swiftly-$(uname -m).tar.gz
            ./swiftly init --quiet-shell-followup
          fi

          . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
          hash -r

          if ! swiftly list | grep -q "6.3.0"; then
            swiftly install 6.3.0
          fi
          swiftly use 6.3.0
          swiftly run swift --version

      - name: Build example package
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh" ]; then
            . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
            hash -r
          fi
          swiftly run swift build --package-path "Examples/${{ matrix.example }}"