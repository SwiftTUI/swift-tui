name: Deploy Website to Cloudflare Pages

# Builds the composed deployment artifact (Astro site + combined DocC
# archive + WebExample WASI demo) at root-relative paths and uploads it
# to Cloudflare Pages via Wrangler.
#
# Layout of the uploaded artifact:
#   /              <- Astro site (Website/dist/)
#   /docs/         <- DocC archive (.build-docs/)
#   /webexample/   <- Examples/WebExample/pages-dist/
#
# One-time setup:
#   1. Create the project in Cloudflare:
#        wrangler pages project create SwiftTUI --production-branch main
#      (or via dashboard: Pages -> Create application -> Direct upload.)
#   2. Add repo secrets:
#        CLOUDFLARE_API_TOKEN     <- token with `Cloudflare Pages: Edit` permission
#        CLOUDFLARE_ACCOUNT_ID    <- your account ID (Cloudflare dashboard sidebar)
#   3. (Optional) Add repo variables:
#        CLOUDFLARE_PAGES_PROJECT <- project name; defaults to `SwiftTUI`
#        CLOUDFLARE_SITE_URL      <- absolute URL Astro should canonicalize to.
#                                    Defaults to https://swifttui.sh (the
#                                    production domain). Override for previews.

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: macos-26
    timeout-minutes: 30

    env:
      CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'swift-tui' }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve site URL
        id: site
        shell: bash
        env:
          CF_SITE_URL: ${{ vars.CLOUDFLARE_SITE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${CF_SITE_URL:-}" ]; then
            printf 'url=%s\n' "$CF_SITE_URL" >> "$GITHUB_OUTPUT"
          else
            printf 'url=https://swifttui.sh\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          SWIFT_VERSION="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$SWIFT_VERSION"
          swiftly list
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-cfpages-${{ hashFiles('Examples/WebExample/TerminalApp/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-cfpages-
            ${{ runner.os }}-swiftpm-website-

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            GUI/WebTUIGUI/node_modules
            Examples/WebExample/node_modules
            Website/node_modules
          key: ${{ runner.os }}-bun-cfpages-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cfpages-
            ${{ runner.os }}-bun-website-

      - name: Install wasm Swift SDK used by WebExample
        shell: bash
        run: |
          set -euo pipefail
          if ! swiftly run swift sdk list | grep -q "swift-6.3.1-RELEASE_wasm"; then
            swiftly run swift sdk install \
              https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2
          fi

      - name: Install Binaryen and Brotli
        shell: bash
        run: brew install binaryen brotli

      - name: Install Bun workspace deps
        shell: bash
        run: |
          set -euo pipefail
          hash -r
          bun install --frozen-lockfile

      - name: Build WebExample
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build:wasm

      - name: Validate uploaded WebExample wasm parses in the browser API
        shell: bash
        working-directory: Examples/WebExample
        run: |
          set -euo pipefail
          wasm_path="./pages-dist/TerminalApp/dist/assets/app.wasm"
          brotli --test "$wasm_path"
          bun -e 'const wasmPath = "./pages-dist/TerminalApp/dist/assets/app.wasm"; const proc = Bun.spawnSync({ cmd: ["brotli", "--decompress", "--stdout", wasmPath], stdout: "pipe", stderr: "pipe" }); if (proc.exitCode !== 0) { console.error(new TextDecoder().decode(proc.stderr)); process.exit(proc.exitCode ?? 1); } try { await WebAssembly.compile(proc.stdout); console.log(`Validated Brotli-compressed ${wasmPath}`); } catch (error) { console.error(`Failed to validate ${wasmPath}: ${error instanceof Error ? error.message : String(error)}`); process.exit(1); }'

      # Build Astro with root-relative URLs. ASTRO_BASE=/ removes the
      # /SwiftTUI prefix that the GH Pages build keeps.
      - name: Build Website (Cloudflare-targeted)
        shell: bash
        working-directory: Website
        env:
          ASTRO_SITE: ${{ steps.site.outputs.url }}
          ASTRO_BASE: /
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      # DocC archive served at /docs/. Root-relative deploy means the
      # `--hosting-base-path` is just `docs` (vs. `SwiftTUI/docs` on GH Pages).
      - name: Build DocC archive
        shell: bash
        run: |
          set -euo pipefail
          ./Scripts/build_docc_archive.sh --hosting-base-path docs --output-path .build-docs

      # Same artifact layout as GH Pages, just without the /SwiftTUI prefix.
      - name: Compose Cloudflare Pages artifact
        shell: bash
        env:
          ARTIFACT_ROOT: ${{ github.workspace }}/_cf-pages-artifact
          DOCS_ROOT: ${{ github.workspace }}/_cf-pages-artifact/docs
          WEBEXAMPLE_ROOT: ${{ github.workspace }}/_cf-pages-artifact/webexample
          HOSTING_BASE_PATH: /docs
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_ROOT"
          mkdir -p "$ARTIFACT_ROOT" "$DOCS_ROOT" "$WEBEXAMPLE_ROOT"
          # Astro site at root.
          cp -R Website/dist/. "$ARTIFACT_ROOT/"
          # DocC at /docs/.
          cp -R .build-docs/. "$DOCS_ROOT/"
          # Swift-DocC emits one identical static HTML shell for every symbol
          # page plus the JSON data the shell fetches at runtime. Cloudflare
          # Pages Free deployments are capped at 20,000 files, so keep the
          # DocC data/search/assets and route all documentation paths through
          # the single SPA shell with Website/public/_redirects.
          rm -rf "$DOCS_ROOT/documentation"
          # WebExample at /webexample/.
          cp -R Examples/WebExample/pages-dist/. "$WEBEXAMPLE_ROOT/"
          # Cloudflare Pages rejects individual uploaded assets larger than
          # 25 MiB. `bun run build:wasm` keeps the public URL stable, but
          # stores the wasm bytes Brotli-encoded and advertises that in
          # Website/public/_headers.
          wasm_path="$WEBEXAMPLE_ROOT/TerminalApp/dist/assets/app.wasm"
          if [ ! -f "$wasm_path" ]; then
            echo "::error::Missing WebExample wasm at $wasm_path"
            exit 1
          fi
          if ! brotli --test "$wasm_path"; then
            echo "::error::WebExample wasm should already be Brotli-compressed by bun run build:wasm"
            exit 1
          fi
          compressed_wasm_size="$(wc -c < "$wasm_path" | tr -d '[:space:]')"
          pages_asset_limit=$((25 * 1024 * 1024))
          if [ "$compressed_wasm_size" -ge "$pages_asset_limit" ]; then
            echo "::error::Brotli-compressed WebExample wasm is ${compressed_wasm_size} bytes"
            echo "::error::Still above Cloudflare Pages' 25 MiB single-file limit"
            exit 1
          fi
          echo "Verified Brotli-compressed WebExample wasm at ${compressed_wasm_size} bytes"
          artifact_file_count="$(find "$ARTIFACT_ROOT" -type f | wc -l | tr -d '[:space:]')"
          pages_file_limit="${CLOUDFLARE_PAGES_FILE_LIMIT:-20000}"
          echo "Cloudflare Pages artifact contains ${artifact_file_count} files"
          find "$ARTIFACT_ROOT" -mindepth 1 -maxdepth 1 -print | while IFS= read -r child; do
            count="$(find "$child" -type f | wc -l | tr -d '[:space:]')"
            echo "  ${child#$ARTIFACT_ROOT/}: ${count} files"
          done
          if [ "$artifact_file_count" -gt "$pages_file_limit" ]; then
            echo "::error::Cloudflare Pages artifact has ${artifact_file_count} files"
            echo "::error::Above the ${pages_file_limit}-file deployment limit"
            exit 1
          fi

      - name: Resolve deploy branch
        id: branch
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # `main` -> production deployment. Other branches -> preview.
          printf 'branch=%s\n' "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      # Run wrangler directly (rather than via wrangler-action's `command:` shim)
      # so we have full control over argument quoting. All untrusted inputs are
      # passed via env vars and double-quoted shell expansions.
      - name: Deploy to Cloudflare Pages
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_BRANCH: ${{ steps.branch.outputs.branch }}
          CF_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Capture wrangler stdout to extract the deployment URL for the PR comment.
          deploy_log="$(bunx wrangler@latest pages deploy _cf-pages-artifact \
            --project-name="$CF_PROJECT" \
            --branch="$CF_BRANCH" \
            --commit-hash="$CF_COMMIT_SHA" \
            --commit-dirty=true 2>&1 | tee /dev/stderr)"
          # Wrangler prints something like: `✨  Deployment complete! Take a peek over at https://abc123.SwiftTUI.pages.dev`
          deployment_url="$(printf '%s\n' "$deploy_log" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -n1 || true)"
          printf 'deployment-url=%s\n' "${deployment_url:-}" >> "$GITHUB_OUTPUT"
