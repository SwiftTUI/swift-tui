name: Build and deploy WebExample

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build-web-example:
    name: Build WebExample
    runs-on: macos-26

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          # `.swift-version` must match a swift.org release tag (e.g. `6.3` for
          # swift-6.3-RELEASE, `6.3.1` for the 6.3.1 patch). swiftly has no
          # exact entry for `6.3.0`, so it falls forward to `6.3.1`, which then
          # can't import the swift-6.3-RELEASE_wasm SDK (Swift module compat is
          # keyed on full compiler version).
          SWIFT_VERSION="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$SWIFT_VERSION"
          swiftly list
          swiftly run swift --version
          # Persist swiftly on PATH and SWIFTLY_HOME_DIR for subsequent steps
          # (each `run:` step gets a fresh shell, so env.sh sourcing alone won't carry over).
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-webexample-${{ hashFiles('Examples/WebExample/TerminalApp/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-webexample-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            GUI/WebTUIGUI/node_modules
            Examples/WebExample/node_modules
          key: ${{ runner.os }}-bun-webexample-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-webexample-


      - name: Install wasm Swift SDK used by WebExample
        shell: bash
        run: |
          set -euo pipefail

          if ! swiftly run swift sdk list | grep -q "swift-6.3-RELEASE_wasm"; then
            swiftly run swift sdk install \
            https://download.swift.org/swift-6.3-release/wasm-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 9fa4016ee632c7e9e906608ec3b55cf13dfc4dff44e47574c5af58064dc33fd9
          fi

      - name: Install Binaryen
        shell: bash
        run: |
          set -euo pipefail
          brew install binaryen

      - name: Log WebExample toolchain environment
        shell: bash
        run: |
          set -euo pipefail

          env
          echo "PATH=$PATH"
          uname -a
          sw_vers
          arch
          xcodebuild -version
          echo "which bun: $(which bun)"
          echo "which swiftly: $(which swiftly)"
          echo "which swift: $(which swift)"
          echo "which wasm-ld: $(which wasm-ld)"
          echo "which wasm-opt: $(which wasm-opt)"
          bun --version
          bun --revision
          wasm-opt --version
          swiftly list
          swiftly run swift --version
          swiftly run swift sdk list
          plutil -p "$HOME/Library/Developer/Toolchains/swift-6.3-RELEASE.xctoolchain/Info.plist" || true

      - name: Install Bun workspace deps
        shell: bash
        run: |
          set -euo pipefail
          hash -r
          bun install --frozen-lockfile

      - name: Build WebExample
        shell: bash
        working-directory: Examples/WebExample
        run: |
          set -euo pipefail

          bun install --frozen-lockfile
          bun run build

      - name: Validate uploaded WebExample wasm parses in the browser API
        shell: bash
        working-directory: Examples/WebExample
        run: |
          set -euo pipefail
          bun -e 'const wasmPath = "./pages-dist/TerminalApp/dist/assets/app.wasm"; try { await WebAssembly.compile(await Bun.file(wasmPath).arrayBuffer()); console.log(`Validated ${wasmPath}`); } catch (error) { console.error(`Failed to validate ${wasmPath}: ${error instanceof Error ? error.message : String(error)}`); process.exit(1); }'

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: Examples/WebExample/pages-dist

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-web-example
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
