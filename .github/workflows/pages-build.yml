name: Build and deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build-website:
    name: Build Website
    runs-on: macos-26

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install swiftly and Swift toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          # `.swift-version` must match a real swift.org release tag, AND the
          # compiler version must match the wasm SDK below exactly (Swift module
          # compat is keyed on full compiler version, so e.g. 6.3 modules can't
          # be imported by a 6.3.1 compiler).
          SWIFT_VERSION="$(tr -d '[:space:]' < .swift-version)"
          swiftly install --use --assume-yes "$SWIFT_VERSION"
          swiftly list
          swiftly run swift --version
          # Persist swiftly on PATH and SWIFTLY_HOME_DIR for subsequent steps
          # (each `run:` step gets a fresh shell, so env.sh sourcing alone won't carry over).
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-website-${{ hashFiles('Examples/WebExample/TerminalApp/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-website-

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            GUI/WebTUIGUI/node_modules
            Examples/WebExample/node_modules
            Website/node_modules
          key: ${{ runner.os }}-bun-website-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-website-


      - name: Install wasm Swift SDK used by WebExample
        shell: bash
        run: |
          set -euo pipefail

          if ! swiftly run swift sdk list | grep -q "swift-6.3.1-RELEASE_wasm"; then
            swiftly run swift sdk install \
            https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2
          fi

      - name: Install Binaryen
        shell: bash
        run: |
          set -euo pipefail
          brew install binaryen

      - name: Log toolchain environment
        shell: bash
        run: |
          set -euo pipefail

          env
          echo "PATH=$PATH"
          uname -a
          sw_vers
          arch
          xcodebuild -version
          echo "which bun: $(which bun)"
          echo "which swiftly: $(which swiftly)"
          echo "which swift: $(which swift)"
          echo "which wasm-ld: $(which wasm-ld)"
          echo "which wasm-opt: $(which wasm-opt)"
          bun --version
          bun --revision
          wasm-opt --version
          swiftly list
          swiftly run swift --version
          swiftly run swift sdk list
          plutil -p "$HOME/Library/Developer/Toolchains/swift-6.3.1-RELEASE.xctoolchain/Info.plist" || true

      - name: Install Bun workspace deps
        shell: bash
        run: |
          set -euo pipefail
          hash -r
          bun install --frozen-lockfile

      # Build the WebExample WASI app + browser bundle. This is the live demo
      # the marketing site embeds (eventually — the current `Examples/WebExample`
      # marketing fragment is in flight to be consumed as a pure embedding
      # example by the new `Website`).
      - name: Build WebExample
        shell: bash
        working-directory: Examples/WebExample
        run: |
          set -euo pipefail

          bun install --frozen-lockfile
          bun run build

      - name: Validate uploaded WebExample wasm parses in the browser API
        shell: bash
        working-directory: Examples/WebExample
        run: |
          set -euo pipefail
          bun -e 'const wasmPath = "./pages-dist/TerminalApp/dist/assets/app.wasm"; try { await WebAssembly.compile(await Bun.file(wasmPath).arrayBuffer()); console.log(`Validated ${wasmPath}`); } catch (error) { console.error(`Failed to validate ${wasmPath}: ${error instanceof Error ? error.message : String(error)}`); process.exit(1); }'

      # Build the new Astro 6 marketing + docs site. This is the page tree
      # that ships at the GitHub Pages root.
      - name: Build Website
        shell: bash
        working-directory: Website
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Build DocC archive (combined Core + View + TerminalUI + TerminalUICharts)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .build-docs
          # `--enable-experimental-combined-documentation` (swift-docc-plugin 1.4+)
          # merges all listed targets into one archive with a single navigator,
          # which matches the way users actually import the package.
          # `--hosting-base-path swift-terminal-ui/docs` rewrites every internal
          # link to be served at `/swift-terminal-ui/docs/...` under the project
          # GitHub Pages site, namespaced cleanly under the WebExample assets.
          swiftly run swift package \
            --allow-writing-to-directory .build-docs \
            generate-documentation \
            --target Core \
            --target View \
            --target TerminalUI \
            --target TerminalUICharts \
            --enable-experimental-combined-documentation \
            --transform-for-static-hosting \
            --hosting-base-path swift-terminal-ui/docs \
            --output-path .build-docs

      # Compose the final Pages artifact:
      #   /                ← Website (Astro 6 marketing + docs)
      #   /docs/           ← DocC archive at its historical path; the /api/
      #                       landing on the Website deep-links into it
      #   /webexample/     ← Examples/WebExample marketing demo, kept
      #                       available so the live-WASI iframe on the
      #                       Website can mount it without a separate host
      - name: Compose Pages artifact
        shell: bash
        env:
          ARTIFACT_ROOT: ${{ github.workspace }}/_pages-artifact
          DOCS_ROOT: ${{ github.workspace }}/_pages-artifact/docs
          WEBEXAMPLE_ROOT: ${{ github.workspace }}/_pages-artifact/webexample
          HOSTING_BASE_PATH: /swift-terminal-ui/docs
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_ROOT"
          mkdir -p "$ARTIFACT_ROOT" "$DOCS_ROOT" "$WEBEXAMPLE_ROOT"
          # Website is the new root.
          cp -R Website/dist/. "$ARTIFACT_ROOT/"
          # DocC at /docs/ — same path it has lived at historically.
          cp -R .build-docs/. "$DOCS_ROOT/"
          # Project-owned CSS overrides on top of theme-settings.json. See
          # Examples/WebExample/src/inject-docs-css.ts for the contract; the
          # script is idempotent and safe to re-run.
          bun run Examples/WebExample/src/inject-docs-css.ts
          # WebExample at /webexample/. The Website embeds this as the
          # live demo on the landing page.
          cp -R Examples/WebExample/pages-dist/. "$WEBEXAMPLE_ROOT/"
          # Pages won't serve hidden files unless we mark with .nojekyll.
          touch "$ARTIFACT_ROOT/.nojekyll"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages-artifact

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-website
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
