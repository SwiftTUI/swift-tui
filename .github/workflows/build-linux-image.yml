name: Build Linux dev image

# Builds Scripts/linux/Dockerfile and pushes it to GHCR. Scripts/linux.sh
# and .devcontainer/devcontainer.json both consume the resulting image, so
# this workflow is the only producer.
#
# Triggers: this image rebuilds when its inputs change (the Dockerfile,
# the Swift toolchain pin, or this workflow), and on demand via
# `workflow_dispatch`.
#
# Security note: every user-controllable input ($SWIFT_VERSION, $REF_NAME,
# $EVENT_NAME, $OVERRIDE) is funneled through `env:` and shell-quoted, never
# inlined into a `run:` script. See the GitHub blog post on workflow
# injection prevention.

on:
  push:
    branches: [main]
    paths:
      - "Scripts/linux/Dockerfile"
      - ".swift-version"
      - ".github/workflows/build-linux-image.yml"
  pull_request:
    paths:
      - "Scripts/linux/Dockerfile"
      - ".swift-version"
      - ".github/workflows/build-linux-image.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Push the built image to GHCR"
        type: boolean
        required: false
        # default: true so an un-set boolean input resolves to "true"
        # rather than "false" — see the "Decide whether to push" step.
        default: true

permissions:
  contents: read
  # Required for `docker login ghcr.io` with the auto-provisioned GITHUB_TOKEN.
  packages: write

concurrency:
  group: build-linux-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SWIFTLY_VERSION: "1.1.1"
  # GHCR requires lowercase namespaces; hard-code the org rather than
  # toLower'ing github.repository_owner so a fork doesn't accidentally try
  # to push to its own namespace without packages:write being set up.
  IMAGE_NAME: ghcr.io/swifttui/swift-tui-linux

jobs:
  build:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Swift version
        id: swift
        shell: bash
        run: |
          set -euo pipefail
          # .swift-version is repo-controlled; tr drops any whitespace so
          # the value is safe to embed in shell-quoted contexts later.
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          printf 'version=%s\n' "$swift_version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # Required for build-push-action's BuildKit features and the
        # registry-backed cache below.
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push_decision
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          OVERRIDE: ${{ inputs.push }}
        run: |
          set -euo pipefail
          # Push on main pushes and manual dispatches; build-only on PRs.
          # For workflow_dispatch the `push`
          # input decides — it carries `default: true`, so OVERRIDE is always
          # a concrete "true"/"false" and the dispatch default is honored.
          # (A prior `[ -n "$OVERRIDE" ]` guard was wrong: an un-set boolean
          # input resolves to the string "false", not "", so a plain dispatch
          # silently built without pushing.) All inputs are read from env:
          # vars, never inlined as Actions expressions, so a malicious branch
          # name can't break out.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            push="$OVERRIDE"
          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_NAME" = "main" ]; then
            push=true
          else
            push=false
          fi
          printf 'push=%s\n' "$push" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.push_decision.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: steps.push_decision.outputs.push != 'true'
        uses: docker/build-push-action@v6
        with:
          # Tiny build context — the Dockerfile doesn't COPY anything from
          # the repo, so we limit the context to its own directory.
          context: Scripts/linux
          file: Scripts/linux/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ env.IMAGE_NAME }}:build-${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          build-args: |
            SWIFT_VERSION=${{ steps.swift.outputs.version }}
            SWIFTLY_VERSION=${{ env.SWIFTLY_VERSION }}
          # Add provenance/SBOM for supply-chain hygiene. Cheap to enable.
          provenance: true
          sbom: true

      - name: Build and push image by digest
        if: steps.push_decision.outputs.push == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: Scripts/linux
          file: Scripts/linux/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_NAME }}
          # Registry-backed BuildKit cache. Stored per architecture so native
          # builders never overwrite each other's layers.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          build-args: |
            SWIFT_VERSION=${{ steps.swift.outputs.version }}
            SWIFTLY_VERSION=${{ env.SWIFTLY_VERSION }}
          # Add provenance/SBOM for supply-chain hygiene. Cheap to enable.
          provenance: true
          sbom: true

      - name: Export image digest
        if: steps.push_decision.outputs.push == 'true'
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${DIGEST#sha256:}"
          touch "/tmp/digests/$digest"

      - name: Upload image digest
        if: steps.push_decision.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    if: >-
      needs.build.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.push) ||
        (github.event_name == 'push' && github.ref_name == 'main')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create and inspect manifest
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          swift_version="$(tr -d '[:space:]' < .swift-version)"
          short_sha="${COMMIT_SHA:0:7}"

          tag_args=(-t "$IMAGE_NAME:sha-$short_sha" -t "$IMAGE_NAME:swift-$swift_version")
          if [ "$EVENT_NAME" != "pull_request" ] && [ "$REF_NAME" = "main" ]; then
            tag_args+=(-t "$IMAGE_NAME:latest")
          fi

          digest_refs=()
          while IFS= read -r digest_file; do
            digest_refs+=("$IMAGE_NAME@sha256:$(basename "$digest_file")")
          done < <(find /tmp/digests -type f | sort)

          if [ "${#digest_refs[@]}" -ne 2 ]; then
            printf 'Expected 2 image digests, found %s\n' "${#digest_refs[@]}" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"
          docker buildx imagetools inspect "$IMAGE_NAME:sha-$short_sha"
